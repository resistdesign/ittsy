name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing unpublished release tag to rebuild
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            platform: macos
          - runner: macos-latest
            target: aarch64-apple-darwin
            platform: macos
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Verify SemVer tag
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          test "v${version}" = "${RELEASE_TAG}" || {
            echo "::error::Tag ${RELEASE_TAG} does not match Cargo.toml version ${version}"
            exit 1
          }

      - name: Test
        run: cargo test --locked --target ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Verify Windows GUI subsystem
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $binary = "target/${{ matrix.target }}/release/ittsy.exe"
          $bytes = [System.IO.File]::ReadAllBytes($binary)
          $peOffset = [BitConverter]::ToInt32($bytes, 0x3c)
          $subsystem = [BitConverter]::ToUInt16($bytes, $peOffset + 24 + 68)
          if ($subsystem -ne 2) {
            throw "$binary is not linked as a standalone Windows GUI application"
          }

      - name: Package macOS
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          package="ittsy-${RELEASE_TAG}-${{ matrix.target }}"
          scripts/package-macos.sh target/${{ matrix.target }}/release/ittsy dist
          ditto -c -k --sequesterRsrc --keepParent dist/ittsy.app "${package}.zip"
          shasum -a 256 "${package}.zip" > "${package}.zip.sha256"

      - name: Package Linux
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          package="ittsy-${RELEASE_TAG}-${{ matrix.target }}"
          scripts/package-linux.sh target/${{ matrix.target }}/release/ittsy dist
          tar -C dist -czf "${package}.tar.gz" ittsy
          sha256sum "${package}.tar.gz" > "${package}.tar.gz.sha256"

      - name: Package Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $package = "ittsy-$env:RELEASE_TAG-${{ matrix.target }}"
          Compress-Archive -Path target/${{ matrix.target }}/release/ittsy.exe -DestinationPath "$package.zip"
          $hash = (Get-FileHash "$package.zip" -Algorithm SHA256).Hash.ToLower()
          [System.IO.File]::WriteAllText(
            "$package.zip.sha256",
            "$hash  $package.zip`n",
            [System.Text.Encoding]::ASCII
          )

      - uses: actions/upload-artifact@v4
        with:
          name: ittsy-${{ matrix.target }}
          path: |
            ittsy-*.zip
            ittsy-*.zip.sha256
            ittsy-*.tar.gz
            ittsy-*.tar.gz.sha256
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ittsy-*
          path: artifacts
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${RELEASE_TAG}" \
            artifacts/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "ittsy ${RELEASE_TAG}" \
            --generate-notes \
            --verify-tag
