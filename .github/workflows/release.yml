name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@v2

      - name: Verify SemVer tag
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          test "v${version}" = "${GITHUB_REF_NAME}" || {
            echo "::error::Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${version}"
            exit 1
          }

      - name: Test
        run: cargo test --locked

      - name: Build
        run: cargo build --release --locked

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          package="ittsy-${GITHUB_REF_NAME}-x86_64-apple-darwin"
          mkdir "${package}"
          cp target/release/ittsy README.md LICENSE "${package}/"
          tar -czf "${package}.tar.gz" "${package}"
          shasum -a 256 "${package}.tar.gz" > "${package}.tar.gz.sha256"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            ittsy-*.tar.gz \
            ittsy-*.tar.gz.sha256 \
            --title "ittsy ${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag
